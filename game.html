<!DOCTYPE html>
<html>
<head>
    <title>Game u0_a345 V3 DOR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {background:#000; color:#f0f; font-family:Arial; text-align:center; padding:20px;}
        h1 {text-shadow:0 0 10px #f0f; font-size:28px;}
        input, button {padding:15px; margin:10px; border:2px solid #f0f; background:black; color:#f0f; border-radius:10px; font-size:18px; width:200px;}
        button {background:#f0f; color:black; font-weight:bold; cursor:pointer;}
        button:active {transform:scale(0.95); box-shadow:0 0 20px #f0f;}
        #hasil {margin-top:20px; font-size:22px; min-height:30px;}
    </style>
</head>
<body>
    <h1>GAME PEMBASMI HATERS V3</h1>
    <p>u0_a345 nyimpen angka 1-10. Tembak yang bener sayang!</p>

    <input type="number" id="tebakan" min="1" max="10" placeholder="1-10 aja">
    <br>
    <button onclick="tembak()">TEMBAK SAYANG</button>

    <h2 id="hasil"></h2>

    <script>
        let angkaRahasia = Math.floor(Math.random() * 10) + 1;

        function tembak() {
            let audioDor = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU...');
            audioDor.play();

            let tebakan = document.getElementById('tebakan').value;
            let hasil = document.getElementById('hasil');
            if(tebakan == "") {hasil.innerHTML = "ISI DULU SAYANG 😭"; return;}
            if(tebakan == angkaRahasia) {
                hasil.innerHTML = "BENER! u0_a345 MENANG! Haters = 0 nilainya 🤍🖤🪽";
                angkaRahasia = Math.floor(Math.random() * 10) + 1;
            } else {
                hasil.innerHTML = "SALA H. Netizen ketawa. Coba lagi sayang";
            }
            document.getElementById('tebakan').value = "";
        }
    </script>
</body>
</html>
